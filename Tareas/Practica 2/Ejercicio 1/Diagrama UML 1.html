<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Diagrama UML - Clase MiPunto</title>
    <link rel="stylesheet" href="Estilos 1/estilos1.css">
</head>
<body>
    <div class="uml-class">
        <div class="header">MiPunto</div>
        <div class="attributes">
            <div class="section-title">Atributos</div>
            <ul>
                <li>- x: float</li>
                <li>- y: float</li>
            </ul>
        </div>
        <div class="methods">
            <div class="section-title">Métodos</div>
            <ul>
                <li>+ MiPunto()</li>
                <li>+ MiPunto(x: float, y: float)</li>
                <li>+ get_x(): float</li>
                <li>+ get_y(): float</li>
                <li>+ distancia(p: MiPunto): float</li>
                <li>+ distancia(x: float, y: float): float</li>
            </ul>
        </div>
    </div>
</body>
</html>
